<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShaadiGuide.in - Matrimony Bio, Kundli & Shubh Muhurat Hub</title>
    
    <style>
        /* Base Website Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
            text-align: center;
        }
        
        /* Language Selector Bar Styling */
        .language-banner {
            background-color: #333;
            color: white;
            padding: 10px 0;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        /* Hiding the ugly default Google Translate header box */
        .goog-te-banner-frame.skiptranslate {
            display: none !important;
        }
        body {
            top: 0px !important;
        }
        #google_translate_element {
            display: inline-block;
        }

        /* Header & Content Styling */
        header {
            background-color: #ff5a60; /* Wedding warm red/pink */
            color: white;
            padding: 40px 20px;
        }
        h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .welcome-text {
            font-size: 1.2rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- 🌐 LANGUAGE SELECTOR BAR -->
    <div class="language-banner">
        <span>Translate Site / भाषा चुनें: </span>
        <!-- Google Translate will inject the dropdown button right here -->
        <div id="google_translate_element"></div>
    </div>

    <header>
        <h1>Welcome to ShaadiGuide.in</h1>
        <p>Your Ultimate Pre-Wedding & Matrimony Guide</p>
    </header>

    <div class="container">
        <p class="welcome-text">
            We are currently setting up India's premier free resource for <strong>Matrimonial Biodata Templates</strong>, 
            <strong>Kundli Matching Guides</strong>, and <strong>Auspicious Shubh Muhurat Dates</strong>. 
            Stay tuned—we are launching very soon!
        </p>
    </div>

    <!-- ⚙️ GOOGLE TRANSLATE SCRIPT -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                /* Included high-traffic regional Indian languages */
                includedLanguages: 'en,hi,bn,mr,te,ta,gu,ur', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
